<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link href="./src/output.css" rel="stylesheet">

  <title>Frontend Mentor | Weather app</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->

</head>

<body class="bg-neutral900 p-6 xl:px-28 xl:py-12 flex flex-col">
  <header class="flex justify-between items-center">
    <img src="./assets/images/logo.svg" loading="lazy" class="max-w-[137.9px] max-h-7">
    <div class="unit-selector-container relative">
      <div class="dropdown flex items-center bg-neutral800 p-3 gap-1.5 rounded-md">
        <img src="./assets/images/icon-units.svg" loading="lazy" class="">
        <p class="font-DMSans text-preset8 text-white">Units</p>
        <img src="./assets/images/icon-dropdown.svg" loading="lazy"
          class="rotate-0 dropdown-icon transition-transform duration-200">
      </div>
      <div class="w-53.5 bg-neutral800 z-100  absolute right-0 top-11  text-white rounded-md opacity-0 -translate-y-2
            transition-all duration-200 dropdown-menu">
        <div class="px-2 py-1.5 flex flex-col gap-2">
          <h3 class="text-preset7 font-DMSans px-2 py-2.5">Switch to imperial</h3>
          <div class="temperature-change">
            <p class="text-preset8 text-neutral300 px-2 pt-1.5 mb-2">Temperature</p>
            <label
              class="flex items-center justify-between has-checked:bg-neutral700 rounded-lg px-2 py-2.5 hover:bg-neutral600"
              for="celsius">
              <p class="text-preset7">Celsius (°C)</p>
              <!-- manipulating radio buttons to make them into checkmark, i think i might be back to using this particular edit because there's no input type of "check", so i have to resort to using the peer pseudo -->
              <div>
                <!-- have a radio button and then adding the peer pseudo and hide it first -->
                <input type="radio" name="temperature" class="peer hidden" id="celsius" value="celsius" checked />
                <!-- past an svg that'll be displayed when the input is clicked -->
                <svg class="opacity-0 peer-checked:opacity-100 transition-opacity" width="13" height="10"
                  viewBox="0 0 13 10" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M11.1836 0.136719C11.3203 0 11.5391 0 11.6484 0.136719L12.4414 0.902344C12.5508 1.03906 12.5508 1.25781 12.4414 1.36719L4.23828 9.57031C4.10156 9.70703 3.91016 9.70703 3.77344 9.57031L0.109375 5.93359C0 5.79688 0 5.57812 0.109375 5.46875L0.902344 4.67578C1.01172 4.56641 1.23047 4.56641 1.36719 4.67578L3.99219 7.32812L11.1836 0.136719Z"
                    fill="white" />
                </svg>

              </div>
            </label>
            <label
              class="flex items-center justify-between has-checked:bg-neutral700 rounded-lg px-2 py-2.5 hover:bg-neutral600"
              for="Farenheit">
              <p class="text-preset7 ">Farenheit (°F)</p>
              <div>
                <input type="radio" name="temperature" class="peer hidden" id="Farenheit" value="fahrenheit" />
                <svg class="opacity-0 peer-checked:opacity-100 transition-opacity" width="13" height="10"
                  viewBox="0 0 13 10" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M11.1836 0.136719C11.3203 0 11.5391 0 11.6484 0.136719L12.4414 0.902344C12.5508 1.03906 12.5508 1.25781 12.4414 1.36719L4.23828 9.57031C4.10156 9.70703 3.91016 9.70703 3.77344 9.57031L0.109375 5.93359C0 5.79688 0 5.57812 0.109375 5.46875L0.902344 4.67578C1.01172 4.56641 1.23047 4.56641 1.36719 4.67578L3.99219 7.32812L11.1836 0.136719Z"
                    fill="white" />
                </svg>

              </div>
            </label>
          </div>
          <div class="bg-neutral600 w-full h-px"></div>
          <div class="wind-speed">
            <p class="text-preset8 text-neutral300 px-2 pt-1.5 mb-2">Wind Speed</p>
            <label
              class="flex items-center justify-between has-checked:bg-neutral700 rounded-lg px-2 py-2.5 hover:bg-neutral600">
              <p class="text-preset7">km/h</p>
              <div>
                <input type="radio" name="windSpeed" class="peer hidden" id="kilometre" value="kmh" />
                <svg class="opacity-0 peer-checked:opacity-100 transition-opacity" width="13" height="10"
                  viewBox="0 0 13 10" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M11.1836 0.136719C11.3203 0 11.5391 0 11.6484 0.136719L12.4414 0.902344C12.5508 1.03906 12.5508 1.25781 12.4414 1.36719L4.23828 9.57031C4.10156 9.70703 3.91016 9.70703 3.77344 9.57031L0.109375 5.93359C0 5.79688 0 5.57812 0.109375 5.46875L0.902344 4.67578C1.01172 4.56641 1.23047 4.56641 1.36719 4.67578L3.99219 7.32812L11.1836 0.136719Z"
                    fill="white" />
                </svg>
              </div>
            </label>
            <label
              class="flex items-center justify-between has-checked:bg-neutral700 rounded-lg px-2 py-2.5 hover:bg-neutral600">
              <p class="text-preset7 ">mph</p>
              <div>
                <input type="radio" name="windSpeed" class="peer hidden" id="mph" value="mph" checked />
                <svg class="opacity-0 peer-checked:opacity-100 transition-opacity" width="13" height="10"
                  viewBox="0 0 13 10" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M11.1836 0.136719C11.3203 0 11.5391 0 11.6484 0.136719L12.4414 0.902344C12.5508 1.03906 12.5508 1.25781 12.4414 1.36719L4.23828 9.57031C4.10156 9.70703 3.91016 9.70703 3.77344 9.57031L0.109375 5.93359C0 5.79688 0 5.57812 0.109375 5.46875L0.902344 4.67578C1.01172 4.56641 1.23047 4.56641 1.36719 4.67578L3.99219 7.32812L11.1836 0.136719Z"
                    fill="white" />
                </svg>
              </div>
            </label>
          </div>
          <div class="bg-neutral600 w-full h-px"></div>
          <div class="precipitation">
            <p class="text-preset8 text-neutral300 px-2 pt-1.5 mb-2">Precipitation</p>
            <label
              class="flex items-center justify-between has-checked:bg-neutral700 rounded-lg px-2 py-2.5 hover:bg-neutral600">
              <p class="text-preset7">Millimeters (mm)</p>
              <div>
                <input type="radio" name="precipitation" class="peer hidden" id="millimeters" value="mm" checked />
                <svg class="opacity-0 peer-checked:opacity-100 transition-opacity" width="13" height="10"
                  viewBox="0 0 13 10" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M11.1836 0.136719C11.3203 0 11.5391 0 11.6484 0.136719L12.4414 0.902344C12.5508 1.03906 12.5508 1.25781 12.4414 1.36719L4.23828 9.57031C4.10156 9.70703 3.91016 9.70703 3.77344 9.57031L0.109375 5.93359C0 5.79688 0 5.57812 0.109375 5.46875L0.902344 4.67578C1.01172 4.56641 1.23047 4.56641 1.36719 4.67578L3.99219 7.32812L11.1836 0.136719Z"
                    fill="white" />
                </svg>

              </div>
            </label>
            <label
              class="flex items-center justify-between has-checked:bg-neutral700 rounded-lg px-2 py-2.5 hover:bg-neutral600">
              <p class="text-preset7 ">inches (in)</p>
              <div>
                <input type="radio" name="precipitation" class="peer hidden" id="inches" value="inch" />
                <svg class="opacity-0 peer-checked:opacity-100 transition-opacity" width="13" height="10"
                  viewBox="0 0 13 10" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M11.1836 0.136719C11.3203 0 11.5391 0 11.6484 0.136719L12.4414 0.902344C12.5508 1.03906 12.5508 1.25781 12.4414 1.36719L4.23828 9.57031C4.10156 9.70703 3.91016 9.70703 3.77344 9.57031L0.109375 5.93359C0 5.79688 0 5.57812 0.109375 5.46875L0.902344 4.67578C1.01172 4.56641 1.23047 4.56641 1.36719 4.67578L3.99219 7.32812L11.1836 0.136719Z"
                    fill="white" />
                </svg>

              </div>
            </label>
          </div>
        </div>
      </div>
    </div>
  </header>
  <main>
    <h1 class="text-preset2 text-center text-white my-10 font-briscolage">How's the sky looking today?
    </h1>

    <section id="search-menu" class="lg:flex lg:items-center lg:gap-2 lg:w-163.75 lg:h-14 lg:mx-auto">
      <div class="relative">
        <div id="search-container" class="flex items-center bg-neutral800 p-4 rounded-xl gap-4">
          <img src="./assets/images/icon-search.svg" loading="lazy" alt="search-icon" class=" max-h-7">
          <input type="text" id="search-bar" name="search-bar" placeholder="Search for a place..."
            class="text-neutral200 text-preset5 outline-0 font-DMSans w-full h-full lg:w-131.5">
        </div>
      </div>
      <button id="search-btn"
        class="bg-blue500 w-full my-2 p-3 text-center text-preset5 text-white rounded-xl font-DMSans lg:w-28.5 lg:h-14">Search</button>
    </section>
    <section class="weather__grid lg:grid lg:grid-cols-[2fr_1fr] lg:items-start lg:gap-8">
      <section class="">
        <section id="weather__information-display"
          class="loader hidden w-[327px] h-[341px] bg-neutral800 text-white bg-cover md:flex md:items-center rounded-3xl px-6 py-20 my-5 flex justify-center items-center gap-2">
          <img src="./assets/images/icon-loading.svg" class="animate-spin" />
          <p class="text-preset6">loading</p>
        </section>
        <section id="weather__information-display"
          class="text-white md:bg-[url('/assets/images/bg-today-large.svg')] max-md:bg-[url('/assets/images/bg-today-small.svg')] bg-no-repeat bg-cover md:flex md:items-center rounded-3xl px-6 py-20 my-5 ">
          <div class="country-state-and-date max-md:text-center w-full flex flex-col gap-2">

          </div>
          <div class="weather-temp-and-image flex justify-end max-md:justify-center w-full items-center font-DMSans ">

          </div>
        </section>

        <section id="climate__element" class="text-white font-DMSans grid grid-cols-2 md:grid-cols-4  gap-2">
          <div id="pFeelLike" class="bg-neutral800 border border-neutral600  flex flex-col gap-4 p-5 rounded-xl">
            <p class="text-preset6">Feels Like</p>
            <p class="text-preset3">-</p>
          </div>
          <div id="pHumidity" class="bg-neutral800 border border-neutral600 flex flex-col gap-4 p-5 rounded-xl">
            <p class="text-preset6">Humidity</p>
            <p class="text-preset3">-</p>
          </div>
          <div id="pWind" class="bg-neutral800 border border-neutral600 flex flex-col gap-4 p-5 rounded-xl">
            <p class="text-preset6">Wind</p>
            <p class="text-preset3">-</p>
          </div>
          <div id="pPrecipitation" class="bg-neutral800 border border-neutral600 flex flex-col gap-4 p-5 rounded-xl">
            <p class="text-preset6">Precipitation</p>
            <p class="text-preset3">-</p>
          </div>
        </section>
      </section>

      <section id="daily-forecast" class="my-5 lg:row-start-2">
        <h2 class="text-preset5 text-white">Daily forecast</h2>
        <div class="forecast-container text-white w-full grid grid-cols-3 md:flex gap-3 my-5 font-DMSans">
          <div
            class=" w-[101px] h-[137px] bg-neutral800 rounded-xl flex flex-col items-center p-4 border border-neutral600">

          </div>
          <div
            class=" w-[101px] h-[137px] bg-neutral800 rounded-xl flex flex-col items-center p-4 border border-neutral600">

          </div>
          <div
            class=" w-[101px] h-[137px] bg-neutral800 rounded-xl flex flex-col items-center p-4 border border-neutral600">

          </div>
          <div
            class=" w-[101px] h-[137px] bg-neutral800 rounded-xl flex flex-col items-center p-4 border border-neutral600">

          </div>
          <div
            class=" w-[101px] h-[137px] bg-neutral800 rounded-xl flex flex-col items-center p-4 border border-neutral600">

          </div>
          <div
            class=" w-[101px] h-[137px] bg-neutral800 rounded-xl flex flex-col items-center p-4 border border-neutral600">

          </div>
          <div
            class=" w-[101px] h-[137px] bg-neutral800 rounded-xl flex flex-col items-center p-4 border border-neutral600">

          </div>
        </div>
      </section>
      <section
        class="text-white font-DMSans my-5 bg-neutral800 px-4 py-5 rounded-[20px] lg:col-start-2 lg:col-end-3 lg:row-start-1 lg:row-end-3 overflow-y-auto">
        <div class="flex items-center justify-between">
          <p class="text-preset5">Hourly forecast</p>
          <div class="relative">
            <div class="flex items-center gap-2 bg-neutral600 px-4 py-2 rounded-md days-dropdown ">
              <p class="text-preset8" id="hourly__forecast-day">-</p>
              <img src="./assets/images/icon-dropdown.svg" loading="lazy" alt="dropdown-icon"
                class="days-dropdown-icon transition-transform duration-200" />
            </div>
            <div class="absolute right-0 min-w-48 top-10 z-10 bg-neutral800 border border-neutral600 rounded-md
            transition-all duration-200 days-dropdown-menu opacity-0">
              <div class="p-2">
                <ul class="p-2 list-none text-preset7 text-white flex flex-col gap-2 days-dropdown-menu">

                  <li class="rounded-md">
                    <input type="radio" id="tuesday" value="Tuesday" name="hourly-forecast" class="peer hidden"
                      checked />
                    <label for="tuesday"
                      class="block p-2 cursor-pointer transition-colors peer-checked:bg-neutral600 hover:bg-neutral700">
                      Tuesday
                    </label>
                  </li>
                  <li class="rounded-md">
                    <input type="radio" id="wednesday" name="hourly-forecast" value="Wednesday" class="peer hidden" />
                    <label for="wednesday"
                      class="block p-2 cursor-pointer transition-colors peer-checked:bg-neutral600 hover:bg-neutral700">
                      Wednesday
                    </label>
                  </li>
                  <li class="rounded-md">
                    <input type="radio" id="thursday" name="hourly-forecast" value="Thursday" class="peer hidden" />
                    <label for="thursday"
                      class="block p-2 cursor-pointer transition-colors peer-checked:bg-neutral600 hover:bg-neutral700">
                      Thursday
                    </label>
                  </li>
                  <li class="rounded-md ">
                    <input type="radio" id="friday" value="Friday" name="hourly-forecast" class="peer hidden" />
                    <label for="friday"
                      class="block p-2 cursor-pointer transition-colors peer-checked:bg-neutral600 hover:bg-neutral700">
                      Friday
                    </label>
                  </li>
                  <li class=" rounded-md">
                    <input type="radio" id="saturday" value="Saturday" name="hourly-forecast" class="peer hidden" />
                    <label for="saturday"
                      class="block p-2 cursor-pointer transition-colors peer-checked:bg-neutral600 hover:bg-neutral700">
                      Saturday
                    </label>
                  </li>
                  <li class="rounded-md">
                    <input type="radio" id="sunday" value="Sunday" name="hourly-forecast" class="peer hidden" />
                    <label for="sunday"
                      class="block p-2 cursor-pointer transition-colors peer-checked:bg-neutral600 hover:bg-neutral700">
                      Sunday
                    </label>
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </div>
        <div id="hourly__forecast-container" class="overflow-y-scroll h-150">
          <div
            class="w-[295px] h-[58px] flex items-center justify-between bg-neutral700 border border-neutral600 my-3 p-2 rounded-md ">

          </div>
          <div
            class="w-[295px] h-[58px] flex items-center justify-between bg-neutral700 border border-neutral600 my-3 p-2 rounded-md ">

          </div>
          <div
            class="w-[295px] h-[58px] flex items-center justify-between bg-neutral700 border border-neutral600 my-3 p-2 rounded-md ">

          </div>
          <div
            class="w-[295px] h-[58px] flex items-center justify-between bg-neutral700 border border-neutral600 my-3 p-2 rounded-md ">

          </div>
          <div
            class="w-[295px] h-[58px] flex items-center justify-between bg-neutral700 border border-neutral600 my-3 p-2 rounded-md ">

          </div>
          <div
            class="w-[295px] h-[58px] flex items-center justify-between bg-neutral700 border border-neutral600 my-3 p-2 rounded-md ">

          </div>
          <div
            class="w-[295px] h-[58px] flex items-center justify-between bg-neutral700 border border-neutral600 my-3 p-2 rounded-md ">

          </div>
          <div
            class="w-[295px] h-[58px] flex items-center justify-between bg-neutral700 border border-neutral600 my-3 p-2 rounded-md ">

          </div>
          <div
            class="w-[295px] h-[58px] flex items-center justify-between bg-neutral700 border border-neutral600 my-3 p-2 rounded-md ">

          </div>
          <div
            class="w-[295px] h-[58px] flex items-center justify-between bg-neutral700 border border-neutral600 my-3 p-2 rounded-md ">

          </div>
          <div
            class="w-[295px] h-[58px] flex items-center justify-between bg-neutral700 border border-neutral600 my-3 p-2 rounded-md ">

          </div>
          <div
            class="w-[295px] h-[58px] flex items-center justify-between bg-neutral700 border border-neutral600 my-3 p-2 rounded-md ">

          </div>

        </div>
      </section>
    </section>
  </main>
  <script src="./script.js">

  </script>
</body>

</html>
